<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MO-ARK District Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0A1628;
    --blue: #1E50A0;
    --gold: #C8962A;
    --gold-lt: #E8B84B;
    --white: #FFFFFF;
    --cream: #F8F6F1;
    --border: rgba(0,0,0,0.09);
    --muted: #6B7280;
    --radius: 12px;
    --ff-display: 'DM Serif Display', Georgia, serif;
    --ff-body: 'DM Sans', system-ui, sans-serif;
  }

  html, body {
    height: 100%;
    font-family: var(--ff-body);
    background: var(--navy);
    color: var(--white);
    overflow: hidden;
  }

  /* Animated grid background */
  .bg {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(200,150,42,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(30,80,160,0.15) 0%, transparent 50%);
    z-index: 0;
  }
  .bg-grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
    z-index: 0;
  }

  .login-wrap {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }

  .login-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 3rem;
    width: 100%;
    max-width: 420px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    animation: fadeUp 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .login-logo {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 2.5rem;
  }
  .login-logo-mark {
    width: 44px;
    height: 44px;
    background: var(--gold);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--ff-display);
    font-size: 1.25rem;
    color: var(--navy);
    font-weight: 700;
    flex-shrink: 0;
  }
  .login-logo-text {
    display: flex;
    flex-direction: column;
  }
  .login-logo-name {
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--white);
    line-height: 1.2;
  }
  .login-logo-sub {
    font-size: 0.725rem;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.04em;
  }

  .login-title {
    font-family: var(--ff-display);
    font-size: 1.875rem;
    line-height: 1.1;
    margin-bottom: 0.5rem;
    color: var(--white);
  }
  .login-title em {
    font-style: italic;
    color: var(--gold-lt);
  }
  .login-desc {
    font-size: 0.875rem;
    color: rgba(255,255,255,0.45);
    line-height: 1.65;
    margin-bottom: 2rem;
  }

  .form-group {
    margin-bottom: 1rem;
  }
  .form-label {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.5);
    margin-bottom: 0.5rem;
  }
  .form-input {
    width: 100%;
    padding: 0.8rem 1rem;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    font-size: 0.9375rem;
    color: var(--white);
    font-family: var(--ff-body);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .form-input::placeholder { color: rgba(255,255,255,0.25); }
  .form-input:focus {
    border-color: var(--gold);
    background: rgba(255,255,255,0.09);
  }

  .login-btn {
    width: 100%;
    padding: 0.9rem;
    background: var(--gold);
    color: var(--navy);
    font-weight: 700;
    font-size: 0.9375rem;
    font-family: var(--ff-body);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    margin-top: 0.5rem;
  }
  .login-btn:hover { background: var(--gold-lt); transform: translateY(-1px); }
  .login-btn:active { transform: translateY(0); }

  .login-error {
    background: rgba(220,53,69,0.15);
    border: 1px solid rgba(220,53,69,0.3);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    font-size: 0.875rem;
    color: #f87171;
    margin-top: 1rem;
    display: none;
  }
  .login-error.show { display: block; }

  .login-back {
    display: block;
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.8125rem;
    color: rgba(255,255,255,0.35);
    text-decoration: none;
    transition: color 0.2s;
  }
  .login-back:hover { color: rgba(255,255,255,0.65); }

  .badge-portal {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(200,150,42,0.12);
    border: 1px solid rgba(200,150,42,0.25);
    border-radius: 100px;
    padding: 0.3rem 0.75rem;
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--gold-lt);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 1rem;
  }
</style>
</head>
<body>
<div class="bg"></div>
<div class="bg-grid"></div>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-mark">KC</div>
      <div class="login-logo-text">
        <span class="login-logo-name">MO-ARK District</span>
        <span class="login-logo-sub">Key Club International</span>
      </div>
    </div>

    <div class="badge-portal">⚙ Officer Portal</div>
    <h1 class="login-title">Welcome <em>back.</em></h1>
    <p class="login-desc">Sign in with your district-assigned email to access the newsletter submission portal.</p>

    <form id="loginForm" autocomplete="off">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input class="form-input" type="email" id="email" placeholder="yourname@gmail.com" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" placeholder="••••••••" required>
      </div>
      <button class="login-btn" type="submit">Sign In →</button>
      <div class="login-error" id="loginError">Incorrect email or password. Please try again.</div>
    </form>

    <a href="https://moarkkeyclub.com" class="login-back">← Back to moarkkeyclub.com</a>
  </div>
</div>

<script src="auth.js"></script>
<script>
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim().toLowerCase();
    const password = document.getElementById('password').value;
    const user = AUTH.login(email, password);
    if (user) {
      window.location.href = 'dashboard.html';
    } else {
      document.getElementById('loginError').classList.add('show');
    }
  });

  // If already logged in, redirect
  if (AUTH.getUser()) window.location.href = 'dashboard.html';
</script>
</body>
</html>
